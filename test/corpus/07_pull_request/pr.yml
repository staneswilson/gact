name: pull-request
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: echo "PR #${{ github.event.pull_request.number }}"
